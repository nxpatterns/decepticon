name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # required for sbom-action to attach SBOMs to release assets
  packages: write
  id-token: write   # cosign keyless OIDC
  attestations: write

jobs:
  docker:
    name: Build & push ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false   # one image failure must not cancel the rest
      matrix:
        include:
          - image: decepticon-langgraph
            dockerfile: containers/langgraph.Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: decepticon-sandbox
            dockerfile: containers/sandbox.Dockerfile
            platforms: linux/amd64
          - image: decepticon-cli
            dockerfile: containers/cli.Dockerfile
            platforms: linux/amd64,linux/arm64
          - image: decepticon-web
            dockerfile: containers/web.Dockerfile
            platforms: linux/amd64,linux/arm64
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build & push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platforms }}
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ghcr.io/purpleailab/${{ matrix.image }}:${{ steps.version.outputs.version }}
            ghcr.io/purpleailab/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Cosign sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes \
            "ghcr.io/purpleailab/${{ matrix.image }}@${DIGEST}"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/purpleailab/${{ matrix.image }}:${{ steps.version.outputs.version }}
          format: cyclonedx-json
          output-file: sbom-${{ matrix.image }}.cdx.json

      - name: Attest SBOM with cosign
        env:
          COSIGN_EXPERIMENTAL: "true"
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.image }}.cdx.json \
            --type cyclonedx \
            "ghcr.io/purpleailab/${{ matrix.image }}@${DIGEST}"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.image }}
          path: sbom-${{ matrix.image }}.cdx.json
